name: Build Android APK (TWA)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-32" "build-tools;32.0.0" "platform-tools"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Clone TWA Quickstart
        run: git clone https://github.com/GoogleChromeLabs/svgomg-twa.git twa-app

      - name: Configure TWA app
        run: |
          cd twa-app
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">Kitty Private</string>
            <string name="launcher_name">Kitty Private</string>
            <string name="asset_statements">[{\"relation\":[\"delegate_permission/common.handle_all_urls\"],\"target\":{\"namespace\":\"web\",\"site\":\"https://amirsr5.github.io\"}}]</string>
          </resources>
          EOF

          cat > app/src/main/res/values/twa_strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="hostName">amirsr5.github.io</string>
            <string name="launchUrl">https://amirsr5.github.io/Kitty.GitHub.io/</string>
            <string name="defaultUrl">https://amirsr5.github.io/Kitty.GitHub.io/</string>
            <string name="navigationColor">#e91e8c</string>
            <string name="navigationColorDark">#e91e8c</string>
            <string name="navigationDividerColor">#e91e8c</string>
            <string name="backgroundColor">#fce4ec</string>
            <string name="themeColor">#e91e8c</string>
          </resources>
          EOF

          sed -i 's/applicationId "com.google.samples.svgomg"/applicationId "com.kitty.private"/' app/build.gradle

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore twa-app/kitty.keystore \
            -alias kitty \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass kitty123 \
            -keypass kitty123 \
            -dname "CN=Kitty, O=Kitty, C=IR"

      - name: Build APK
        run: |
          cd twa-app
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/kitty.keystore \
            -Pandroid.injected.signing.store.password=kitty123 \
            -Pandroid.injected.signing.key.alias=kitty \
            -Pandroid.injected.signing.key.password=kitty123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KittyPrivate-APK
          path: twa-app/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
