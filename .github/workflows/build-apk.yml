name: Build Android APK (TWA)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Create TWA Android Project
        run: |
          mkdir -p twa-app/app/src/main/java/com/kitty/private
          mkdir -p twa-app/app/src/main/res/values
          mkdir -p twa-app/app/src/main/res/xml
          mkdir -p twa-app/gradle/wrapper

          cat > twa-app/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "KittyPrivate"
          include ':app'
          EOF

          cat > twa-app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          cat > twa-app/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > twa-app/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.kitty.private'
              compileSdk 34
              defaultConfig {
                  applicationId "com.kitty.private"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          cat > twa-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="Kitty Private"
                  android:theme="@android:style/Theme.NoTitleBar">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://amirsr5.github.io/Kitty.GitHub.io/" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:value="#e91e8c" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                          android:value="#e91e8c" />
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https"
                              android:host="amirsr5.github.io"
                              android:pathPrefix="/Kitty.GitHub.io/"/>
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.startup.InitializationProvider"
                      android:authorities="com.kitty.private.androidx-startup"
                      android:exported="false"
                      tools:node="merge">
                  </provider>
              </application>
          </manifest>
          EOF

      - name: Download Gradle wrapper
        run: |
          cd twa-app
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew -O gradlew
          chmod +x gradlew

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore twa-app/kitty.keystore \
            -alias kitty \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass kitty123 \
            -keypass kitty123 \
            -dname "CN=Kitty, O=Kitty, C=IR"

      - name: Build APK
        run: |
          cd twa-app
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/kitty.keystore \
            -Pandroid.injected.signing.store.password=kitty123 \
            -Pandroid.injected.signing.key.alias=kitty \
            -Pandroid.injected.signing.key.password=kitty123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KittyPrivate-APK
          path: twa-app/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
